# ─── Gemini API ───
gemini:
  # 주력 모델: 2.5-flash-lite (thinking 없음, 빠르고 안정적)
  model: "gemini-2.5-flash-lite"
  
  # 백업 모델 (순서대로 시도)
  fallback_models:
    - "gemini-2.5-flash"        # 주력과 같은 계열, thinking 지원, 안정적
    - "gemini-2.5-pro"          # 최후 수단, 최고 품질  
    - "gemini-3-flash-preview"  # 나중에 사라질 수 있음 
  
  # 사용 불가 모델 (참고용 메모)
  # - gemini-1.5-flash: 목록에서 삭제됨
  # - gemini-1.5-flash-latest: 목록에서 삭제됨
  # - gemini-2.0-flash: 무료 할당량 0 (불안정)
  
  temperature: 0.9
  max_output_tokens: 8192          # 충분한 응답 공간
  thinking_budget: 2048            # thinking 모델용 (2.5-flash 백업 시)
  retry_count: 2
  retry_delay: 10

# ─── TTS ───
# ─── TTS ───
tts:
  engine: "edge-tts"
  speed_factor: 1.0                     # Edge TTS는 자체 속도 좋으므로 1.0
  max_speed: 1.40                       # Edge TTS는 1.40이면 충분
  silence_between_sentences_ms: 300
  rate: "+20%"                           # 🆕 Edge TTS 기본 말하기 속도 보정 (5%->15%로 빠르게 설정)
  voices:
      money: 'ko-KR-InJoonNeural'
      success: 'ko-KR-InJoonNeural'
      brain: 'ko-KR-SunHiNeural'
      dark: 'ko-KR-InJoonNeural'
      hack: 'ko-KR-SunHiNeural'
      love: 'ko-KR-SunHiNeural'
      relationship: 'ko-KR-SunHiNeural'
      default: 'ko-KR-InJoonNeural'
  ko:
    lang: "ko"
  en:
    lang: "en"
    voice: "en-US-GuyNeural"

# ─── 배경 영상 ───
background:
  primary_source: "pexels"
  fallback_source: "pixabay"
  count: 3
  orientation: "portrait"
  min_duration: 10
  per_page: 15
  pexels:
    base_url: "https://api.pexels.com/videos/search"
  pixabay:
    base_url: "https://pixabay.com/api/videos/"

# ─── BGM ───
bgm:
  enabled: true
  volume: 0.08
  fade_in_ms: 1000
  fade_out_ms: 2000
  directory: "assets/music"

# ─── 자막 ───
subtitle:
  enabled: true
  font_name: "NanumGothic"
  font_size: 72
  font_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline_width: 4
  shadow_offset: 2
  margin_v: 400
  max_chars_per_line_ko: 14
  max_chars_per_line_en: 30
  alignment: 5

# ─── 업로드 ───
upload:
  youtube:
    enabled: true              # false → true ✅
    privacy: "public"          # public / private / unlisted
    made_for_kids: false
    category_id: "27"          # Education
    default_language: "ko"
    title_format: "{emoji} {title} | {channel_name}"
    notify_subscribers: true   # 구독자 알림
  telegram:
    enabled: true
    send_video: true           # 자동 업로드 후에도 텔레그램으로 확인
    max_caption_length: 1024
    
# ─── 히스토리 ───
history:
  enabled: true
  max_records: 500
  file: "history/generated_topics.json"

# ─── 스케줄 ───
schedule:
  ko_cron: "0 7 * * *"
  en_cron: "0 14 * * *"
  timezone: "Asia/Seoul"
