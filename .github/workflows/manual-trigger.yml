name: 🔧 Manual Trigger (Test)

on:
  workflow_dispatch:
    inputs:
      language:
        description: '언어 선택'
        required: true
        default: 'ko'
        type: choice
        options:
          - ko
          - en
      category:
        description: '카테고리'
        required: true
        default: 'dark'
        type: choice
        options:
          - auto
          - quiz
          - success
          - brain
          - dark
          - hack
          - mbti
          - relationship
      dry_run:
        description: '테스트 모드 (업로드 안함)'
        required: false
        default: true
        type: boolean
      debug:
        description: '디버그 모드'
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  test-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          which ffmpeg && which ffprobe
          echo "✅ FFmpeg OK"

      - name: 🔤 Install fonts
        run: |
          sudo apt-get install -y -qq fonts-nanum fonts-nanum-coding
          fc-cache -fv

      - name: 📁 Prepare
        run: mkdir -p output history

      - name: 🧪 Test Generate
        run: |
          cd scripts
          
          ARGS="--language ${{ github.event.inputs.language }}"
          ARGS="$ARGS --config ../config/config.yml"
          ARGS="$ARGS --category ${{ github.event.inputs.category }}"
          
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --skip-upload"
          fi
          
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            ARGS="$ARGS --debug"
          fi
          
          echo "🧪 테스트: python main.py $ARGS"
          python main.py $ARGS

      - name: 📋 List generated files
        if: always()
        run: |
          echo "=== output 폴더 ==="
          ls -lah output/ 2>/dev/null || echo "비어있음"
          echo ""
          echo "=== 파일 상세 ==="
          for f in output/*; do
            if [ -f "$f" ]; then
              echo "$(basename $f): $(du -h $f | cut -f1)"
            fi
          done

      - name: 💾 Save artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-short-${{ github.run_number }}
          path: |
            output/*
          retention-days: 7
