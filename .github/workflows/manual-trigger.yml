name: 🔧 Manual Trigger (Test)

on:
  workflow_dispatch:
    inputs:
      language:
        description: '언어 선택'
        required: true
        default: 'ko'
        type: choice
        options:
          - ko
          - en
      category:
        description: '카테고리'
        required: true
        default: 'dark'
        type: choice
        options:
          - auto
          - quiz
          - success
          - brain
          - dark
          - hack
          - love
          - relationship
      dry_run:
        description: '테스트 모드 (업로드 안함)'
        required: false
        default: true
        type: boolean
      save_history:
        description: '히스토리 저장 (테스트 시 OFF 권장)'
        required: false
        default: false
        type: boolean
      debug:
        description: '디버그 모드'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

jobs:
  test-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          which ffmpeg && which ffprobe
          echo "✅ FFmpeg OK"

      - name: 🔤 Install fonts
        run: |
          sudo apt-get install -y -qq fonts-nanum fonts-nanum-coding
          fc-cache -fv

      - name: 📁 Prepare
        run: mkdir -p output history

      - name: 🧪 Generate Short
        run: |
          cd scripts
          
          ARGS="--language ${{ github.event.inputs.language }}"
          ARGS="$ARGS --config ../config/config.yml"
          ARGS="$ARGS --category ${{ github.event.inputs.category }}"
          
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --skip-upload"
          fi
          
          # 🆕 히스토리 저장 여부
          if [ "${{ github.event.inputs.save_history }}" != "true" ]; then
            ARGS="$ARGS --no-history"
          fi
          
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            ARGS="$ARGS --debug"
          fi
          
          echo "🧪 python main.py $ARGS"
          python main.py $ARGS

      - name: 📋 List files
        if: always()
        run: |
          echo "=== output ==="
          ls -lah output/ 2>/dev/null || echo "비어있음"
          echo ""
          echo "=== history ==="
          cat history/generated_topics.json 2>/dev/null || echo "비어있음"

      # 🆕 히스토리 저장 ON일 때만 커밋
      - name: 📝 Update history
        if: success() && github.event.inputs.save_history == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "=== git status ==="
          git status
          
          git add history/
          
          if git diff --staged --quiet; then
            echo "⚠️ 히스토리 변경 없음"
          else
            git commit -m "📝 Update history $(date +%Y-%m-%d) [test]"
            git push
            echo "✅ 히스토리 커밋 완료"
          fi

      - name: 💾 Save artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-short-${{ github.run_number }}
          path: |
            output/*
          retention-days: 7
