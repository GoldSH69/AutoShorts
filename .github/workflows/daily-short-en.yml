name: 🇺🇸 Daily English Short

on:
  schedule:
    - cron: '0 14 * * *'
  
  workflow_dispatch:
    inputs:
      category_override:
        description: 'Category override'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - quiz
          - success
          - brain
          - dark
          - hack
          - love
          - relationship
      skip_upload:
        description: 'Skip YouTube upload'
        required: false
        default: false
        type: boolean

permissions:
  contents: write              # ← 이 줄 추가!
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_EN }}

jobs:
  generate-short:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          which ffmpeg && which ffprobe
          echo "✅ FFmpeg OK"

      - name: 🔤 Install fonts
        run: |
          sudo apt-get install -y -qq fonts-nanum
          fc-cache -fv

      - name: 📁 Prepare
        run: mkdir -p output history

      - name: 🧠 Generate English Short
        run: |
          cd scripts
          
          ARGS="--language en --config ../config/config.yml"
          
          CATEGORY="${{ github.event.inputs.category_override || 'auto' }}"
          ARGS="$ARGS --category $CATEGORY"
          
          if [ "${{ github.event.inputs.skip_upload }}" = "true" ]; then
            ARGS="$ARGS --skip-upload"
          fi
          
          python main.py $ARGS

      - name: 📋 List generated files
        if: always()
        run: ls -la output/ || echo "비어있음"

      - name: 📝 Update history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          git diff --staged --quiet || git commit -m "📝 [EN] Update history $(date +%Y-%m-%d)"
          git push || echo "⚠️ Push failed"

      - name: 💾 Upload artifact
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: english-short-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7

      - name: 🚨 Notify failure
        if: failure()
        run: |
          cd scripts
          python telegram_notifier.py \
            --status failure \
            --config ../config/config.yml \
            --language en \
            --error "English workflow failed"
