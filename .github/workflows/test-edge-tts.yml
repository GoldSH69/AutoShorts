name: "🧪 Edge TTS Test"

on:
  workflow_dispatch:

jobs:
  test-edge-tts:
    runs-on: ubuntu-latest
    steps:
      - name: Install edge-tts
        run: pip install edge-tts==7.2.7

      - name: List Korean voices
        run: edge-tts --list-voices | grep ko-KR

      - name: Test male voice
        run: |
          edge-tts --voice ko-KR-InJoonNeural \
            --text "당신이 누군가에게 끌리는 이유, 사실 뇌가 먼저 결정합니다. 심리학에서 이걸 초두효과라고 하죠." \
            --rate="+10%" \
            --write-media test_male.mp3
          ls -la test_male.mp3

      - name: Test female voice
        run: |
          edge-tts --voice ko-KR-SunHiNeural \
            --text "당신이 누군가에게 끌리는 이유, 사실 뇌가 먼저 결정합니다. 심리학에서 이걸 초두효과라고 하죠." \
            --rate="+10%" \
            --write-media test_female.mp3
          ls -la test_female.mp3

      - name: Upload audio files
        uses: actions/upload-artifact@v4
        with:
          name: edge-tts-test
          path: "*.mp3"
          retention-days: 3
